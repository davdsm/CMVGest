services:
  cmvgest:
    container_name: cmvgest
    hostname: cmvgest
    build:
      context: .
      args:
        # true = Coming Soon for everyone; ?live=true shows full site. Set VITE_MAINTANCE_MODE=false to go live.
        VITE_MAINTANCE_MODE: ${VITE_MAINTANCE_MODE:-true}
    ports:
      - "4000:3000"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
