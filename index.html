
<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>CMVGest – Projetos chave na mão em Vermil</title>
    <meta
      name="description"
      content="CMVGest desenvolve projetos chave na mão em Vermil e região: terrenos, arquitetura e construção integrados, com foco em conforto, integridade e valorização do investimento."
    />
    <meta
      name="keywords"
      content="CMVGest, projetos chave na mão, Vermil, construção, terrenos, arquitetura, casas, imobiliário, conforto, integridade, valor"
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_PT" />
    <meta property="og:site_name" content="CMVGest" />
    <meta property="og:title" content="CMVGest – Projetos chave na mão em Vermil" />
    <meta
      property="og:description"
      content="Soluções completas para a sua nova casa em Vermil. Projetos chave na mão que unem confiança, integridade e valorização."
    />
    <meta
      property="og:image"
      content="https://www.cmvgest.pt/images/projects/house.png"
    />
    <meta property="og:image:alt" content="Visualização de projeto habitacional CMVGest" />
    <meta property="og:url" content="https://www.cmvgest.pt/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CMVGest – Projetos chave na mão em Vermil"
    />
    <meta
      name="twitter:description"
      content="Terrenos, arquitetura e construção chave na mão em Vermil, pensados para conforto e valorização."
    />
    <meta
      name="twitter:image"
      content="https://www.cmvgest.pt/images/projects/house.png"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CMVGest",
        "url": "https://www.cmvgest.pt/",
        "logo": "https://www.cmvgest.pt/logo.svg",
        "description": "Projetos chave na mão em Vermil: terrenos, arquitetura e construção integrados, com foco em conforto, integridade e valorização do investimento.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "PT"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "telephone": "+351-964-140-860",
          "email": "geral@cmvgest.com"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CMVGest",
        "url": "https://www.cmvgest.pt/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.google.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700&family=Poppins:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
